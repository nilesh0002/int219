<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity 2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    header {
      background: green;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: black;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: color 0.3s;
    }

    nav a:hover {
      color: lightgreen;
    }

    main {
      display: flex;
      gap: 20px;
      padding: 20px;
      align-items: flex-start;
    }

    .slider {
      background: #d6e8f0;
      padding: 20px;
      width: 220px;
      min-height: 350px;
      flex-shrink: 0;
    }

    .slider h2 {
      margin-bottom: 10px;
    }

    .slider h3 {
      padding: 8px 10px;
      margin: 4px 0;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .slider h3:hover {
      color: #1a6a9a;
    }

    .content {
      padding: 20px;
      flex: 1;
      background: #f0f0f0;
    }

    #box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .box {
      border: 2px solid black;
      background: lightgray;
      text-align: center;
      overflow: hidden;
    }

    .box img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .box:hover img {
      transform: scale(1.08);
      opacity: 0.85;
    }

    .box p {
      padding: 10px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <main>
    <div class="slider">
      <h2>Sidebar</h2>
      <h3>Menu Item 1</h3>
      <h3>Menu Item 2</h3>
      <h3>Menu Item 3</h3>
    </div>

    <div class="content">
      <h2>Main Content</h2>
      <p>This is the main content of the website.</p>
      <div id="box">

        <div class="box">
          <img src="/unit1/image/w19.jpg" alt="Mountains">
          <p>Box 1</p>
        </div>

        <div class="box">
          <img src="/unit1/image/w16.jpg" alt="Beach">
          <p>Box 2</p>
        </div>

        <div class="box">
          <img src="/unit1/image/w15.jpg" alt="Forest">
          <p>Box 3</p>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 My Website. All rights reserved.</p>
  </footer>

</body>
</html>
