<!DOCTYPE html>
<html>
    <head>
        <title>Dynamic Paragraph Generator</title>
        <style>
            body {
                font-family: Arial;
                padding: 20px;
            }

            button {
                padding: 10px;
                margin-top: 10px;
            }

            .para {
                background: #f0f0f0;
                padding: 10px;
                margin: 10px 0;
                cursor: pointer;
                transition: 0.3s;
            }
        </style>
    </head>
    <body>
        <h1>Dynamic Paragraph Generator</h1>

        <button onclick="generateParagraphs()">
            Generate Paragraphs
        </button>

        <div id="container"></div>

        <script>
            function generateParagraphs() {
                // ask number
                let count = prompt("How many paragraphs?");

                count = Number(count);

                // container
                let container = document.getElementById("container");

                // clear old data
                container.innerHTML = "";

                // loop
                for (let i = 1; i <= count; i++) {
                    // create paragraph
                    let p = document.createElement("p");

                    // add text
                    p.innerHTML = "This is paragraph " + i;

                    // add class
                    p.className = "para";

                    // click event
                    p.onclick = function () {
                        this.style.fontSize = "30px";
                    };

                    // add paragraph
                    container.appendChild(p);
                }
            }
        </script>
    </body>
</html>
