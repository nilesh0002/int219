<!DOCTYPE html>
<html>
    <head>
        <title>Dynamic Image Gallery</title>
        <style>
            body {
                font-family: Arial;
                padding: 20px;
            }

            button {
                padding: 10px;
                margin-bottom: 20px;
            }

            #gallery {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
            }

            img {
                width: 200px;
                height: 150px;
                object-fit: cover;
                border-radius: 10px;
                cursor: pointer;
                transition: 0.3s;
            }
        </style>
    </head>
    <body>
        <h1>Dynamic Image Gallery</h1>

        <button onclick="createGallery()">
            Create Gallery
        </button>

        <div id="gallery"></div>

        <script>
            function createGallery() {
                // ask number
                let count = prompt("How many images?");

                count = Number(count);

                // image array
                let images = [
                    "shre1.jpg",
                    "shre2.jpg",
                    "shre3.jpg",
                    "shre1.jpg",
                    "shre2.jpg",
                ];

                // gallery div
                let gallery = document.getElementById("gallery");

                // clear old images
                gallery.innerHTML = "";

                // loop
                for (let i = 0; i < count; i++) {
                    // create image
                    let img = document.createElement("img");

                    img.src = images[i];

                    // click event
                    img.onclick = function () {
                        this.style.width = "400px";
                        this.style.height = "300px";
                    };

                    // add image
                    gallery.appendChild(img);
                }
            }
        </script>
    </body>
</html>
