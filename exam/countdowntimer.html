<!DOCTYPE html>
<html>

<head>

    <title>Countdown Timer</title>

    <style>

        body{

            font-family: Arial;

            margin:0;

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            gap:24px;

            min-height:100vh;

            padding:24px;

            background:#111;

            color:white;

            text-align:center;
        }

        #timer{

            font-size:80px;

            line-height:1;

            margin:0;

            color:yellow;
        }

        button{

            padding:12px 28px;

            font-size:18px;

            cursor:pointer;

            border:none;

            border-radius:8px;

            margin:0;
        }

    </style>

</head>

<body>





    <div id="timer">10</div>





    <button onclick="startTimer()">

        Start Timer

    </button>





    <script>

        // initial value
        let count = 10;





        // variable for interval
        let interval;





        function startTimer(){

            // prevent multiple intervals
            clearInterval(interval);





            // reset value
            count = 10;





            // show initial value
            document.getElementById("timer")
                .innerHTML = count;





            // start interval
            interval = setInterval(function(){

                // decrease count
                count--;





                // update display
                document.getElementById("timer")
                    .innerHTML = count;





                // stop at zero
                if(count <= 0){

                    clearInterval(interval);





                    document.getElementById("timer")
                        .innerHTML = "Time Up";
                }

            }, 1000);
        }

    </script>

</body>

</html>
