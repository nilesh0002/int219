<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype</title>
</head>
<body>
    <div id="output"></div>
    


    <script>
        //constructor function
        function car(name){
            this.name = name;
        }
        //add car
        car.prototype.start = function(){
            return this.name + " is starting";
        }

        //create object
        let c1=new car("Toyota");

        document.getElementById("output").innerHTML = c1.start();
    </script>
</body>
</html>
