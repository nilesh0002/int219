wap with the help of prototype where  output showuld be as display :-
my result of  exam is a grade
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task</title>
</head>
<body>
    <h1>Task </h1>
    <p id="result"></p>

    <script>
        function Exam(grade){
            this.grade = grade;
        }

        Exam.prototype.getGrade = function(){
            return "my result of exam is a " + this.grade;
        };

        let exam1 = new Exam("A grade");
        document.getElementById("result").innerHTML = exam1.getGrade();

    </script>

    
    
</body>
</html>
