<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scope chain</title>

</head>
<body>
    <h2>scope chain</h2>
    <p id="output"></p>

    <script>
        //global variable
        let uni="lpu";
        function outerfun(){
            //outerfun scope
           let course="btech CSE"

           function innerfun(){
            //innerfun scope
            let studentname="nilesh";
            document.getElementById("output").innerHTML=
            " Student name: " + studentname + "<br>" + 
            " course : " + course + "<br>" + 
            " university : " + uni;

            console.log("inside inner function: ");
            console.log(studentname);
            console.log(uni);
            console.log(course);
           }
           innerfun()
        }
        outerfun();


        

         //accessing global variable directly
    </script>
    
</body>
</html>
