<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice layout</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>
<style>
    *{
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    header{
        background-color: rgb(169, 154, 157);
        color: white;
        justify-content: center;
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px;
    }
    header img{
        border-radius: 50%;
        height: 80px;
        width: 80px;
    }
    marquee{
        font-size: 24px;
        font-weight: bold;
    }
    nav{
        background: rgb(0, 0, 0);
        color: white;
        padding: 10px;
        text-align: center;

        
    }
    a{
        gap:10px;
        padding: 10px;
        text-decoration: none;
        color: white;
        transition: 0.3s;

    }
    nav a:hover{
        
        color: rgb(255, 0, 0);
        transform: scale(1.1);
    }
    .main{
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .sidbar{
        background: #d6e8f0;
        padding: 20px;
        margin: 20px auto;
        width: 60%;
        min-height: 350px;
    }
    .sidbar h3{
        margin-bottom: 10px;
    }

    .content{  
        width: 75%;
        padding: 20px;
        margin: 20px auto;
    }
    .big-box{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 20px;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        transition: 0.5s;
        
    }
    .box{
        border: 2px solid black;
        padding: 20px;
        background: lightgray;
        text-align: center;
    }
    .big-box:hover .box{
        background-color: #610404;
        color: white;
        transform:translateX(20px);
    }

</style>
<body>
    <header>
       <img src="/unit1/image/lpu.png"alt="LPU LOGO" width="100px" height="100px">
       <marquee>Lovely Professional University</marquee>
    </header>
    <nav>
        <a href="#"><i class="fa-sharp fa-solid fa-home"></i>Home</a>
        <a href="#"><i class="fa-sharp fa-solid fa-info-circle"></i>About us</a>
        <a href="#"><i class="fa-sharp fa-solid fa-phone"></i>Contact us</a>
    </nav>
    <div class="main">
        <div class="sidebar">
            <h3>Slider Content 1</h3>
            <p>Slider Content 2</p>
            <p>Slider Content 3</p>
            <p>Slider Content 4</p>
            <p>Slider Content 5</p>

        <div class="sidebar-boxes">
            <div class="box">Sidebar Box 1</div>
            <div class="box">Sidebar Box 2</div>
            <div class="box">Sidebar Box 3</div>
        </div>
    </div>
</div>


    </div>

</body>
</html>
