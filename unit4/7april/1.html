<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student attendance management</title>
</head>
<style>
    body{
        font-family:'Times New Roman', Times, serif;
        background: #400b0b;
        color: white;
        text-align: center;
    }
    .container{
        width: 400px;
        margin:auto;

    }
    input{
        width: 65%;
        padding: 10px;
        margin: 10px;
    }
    button{
        padding: 8px;
    }
    ul{
        list-style: none;
        padding: 0%;
    }
    li{
        background: rgb(108,105,105);
        margin: 10px 0;
        padding: 10px;
        justify-content: space-between;

    }
</style>
<body>
    <h2> Student Attendance Management</h2>
    <div class="container">
        <input type="text" id="studentiput" placeholder="enter the name">
        <button id="addstudent">Add student</button>

        <ul id="studentlist"></ul>
    </div>
    <script>
        let input = document.getElementById('studentiput');
        let addbtn = document.getElementById('addstudent');
        let list = document.getElementById('studentlist');

        // add student to the list
        addbtn.addEventListener('click', function(){
           
        let name = input.value.trim();
        if(name===" ") return;
            let li = document.createElement('li')
            li.innerHTML = `
            <span>${name}</span>
            <div>
                <button class="present">Present</button>
                <button class="absent">Absent</button>
                <button class="delete">Delete</button>
            </div>
            `;
            list.appendChild(li);
            input.value = '';
        });
    </script>
</body>
</html>
