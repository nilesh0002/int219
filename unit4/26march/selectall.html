<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p> first </p>
    <p> second </p>
    <p> third </p>
    <button onclick="selectAll()">Select All</button>
    <script>
        function selectAll() {
            let p=document.querySelectorAll("p");
            p[0].innerHTML="red";
            p[1].innerHTML="green";
            p[2].innerHTML="blue";
        }
    </script>

</body>
</html>
